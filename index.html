<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellBloc - Kids Word Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        .logo {
            font-size: 4em;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin: 10px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .btn.primary {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
        }
        .loading {
            font-size: 1.1em;
            opacity: 0.8;
        }
        .user-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>SpellBloc</h1>
        <p>Where learning spelling becomes an exciting adventure for kids aged 2-7!</p>
        <div id="content">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <script>
        function checkAuth() {
            const user = localStorage.getItem('spellbloc_user');
            const content = document.getElementById('content');
            
            // Clear localStorage if it contains invalid data
            if (user === 'null' || user === 'undefined' || user === '') {
                localStorage.removeItem('spellbloc_user');
            }
            
            if (user && user !== 'null' && user !== 'undefined') {
                try {
                    const userData = JSON.parse(user);
                    if (userData && userData.parentName) {
                        // User is logged in
                        content.innerHTML = `
                            <div class="user-info">
                                <h3>Welcome back, ${userData.parentName}!</h3>
                                <p>Ready to continue learning?</p>
                            </div>
                            <a href="/game.html" class="btn primary">🎮 Continue Playing</a>
                            <br>
                            <button onclick="logout()" class="btn">🚪 Logout</button>
                        `;
                        return;
                    }
                } catch (e) {
                    localStorage.removeItem('spellbloc_user');
                }
            }
            
            // User not logged in
            content.innerHTML = `
                <a href="/login.html" class="btn primary">🚀 Start Playing Now!</a>
                <br>
                <small style="opacity: 0.8;">New to SpellBloc? Sign up is free!</small>
            `;
        }
        
        function logout() {
            localStorage.removeItem('spellbloc_user');
            checkAuth();
        }
        
        // Run auth check when page loads
        checkAuth();
    </script>
</body>
</html>
