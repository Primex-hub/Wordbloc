<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>SpellBloc - Kids Word Game</title>\n    <style>\n        body {\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            min-height: 100vh;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            margin: 0;\n            color: white;\n            text-align: center;\n        }\n        .container {\n            max-width: 600px;\n            padding: 40px;\n        }\n        .logo {\n            font-size: 4em;\n            margin-bottom: 20px;\n        }\n        h1 {\n            font-size: 3em;\n            margin-bottom: 20px;\n        }\n        p {\n            font-size: 1.3em;\n            margin-bottom: 40px;\n            opacity: 0.9;\n        }\n        .btn {\n            display: inline-block;\n            padding: 15px 30px;\n            background: rgba(255, 255, 255, 0.2);\n            color: white;\n            text-decoration: none;\n            border-radius: 10px;\n            font-size: 1.2em;\n            font-weight: 600;\n            transition: all 0.3s ease;\n            border: 2px solid rgba(255, 255, 255, 0.3);\n        }\n        .btn:hover {\n            background: rgba(255, 255, 255, 0.3);\n            transform: translateY(-2px);\n        }\n        .loading {\n            font-size: 1.1em;\n            opacity: 0.8;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"logo\">🎮</div>\n        <h1>SpellBloc</h1>\n        <p>Where learning spelling becomes an exciting adventure for kids aged 2-7!</p>\n        <div id=\"content\">\n            <div class=\"loading\">Checking authentication...</div>\n        </div>\n    </div>\n\n    <script>\n        // Check authentication and redirect\n        const user = localStorage.getItem('spellbloc_user');\n        const content = document.getElementById('content');\n        \n        if (user) {\n            // User is logged in, redirect to game\n            content.innerHTML = '<div class=\"loading\">Welcome back! Redirecting to game...</div>';\n            setTimeout(() => {\n                window.location.href = '/game.html';\n            }, 1500);\n        } else {\n            // User not logged in, show login button\n            content.innerHTML = '<a href=\"/login.html\" class=\"btn\">🚀 Start Playing Now!</a>';\n        }\n    </script>\n</body>\n</html>
